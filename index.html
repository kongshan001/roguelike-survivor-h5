<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>肉鸽幸存者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;position:absolute;top:0;left:0}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#ui *{pointer-events:auto}
#hud{position:absolute;top:0;left:0;right:0;padding:6px 10px;background:rgba(0,0,0,0.6);align-items:center;justify-content:space-between;font:bold 14px monospace;color:#fff;gap:8px}
#hud .timer{color:#4fc3f7;min-width:52px}
#hud .level{color:#66bb6a}
#hud .gold{color:#ffd54f}
#hud .hp{display:flex;gap:2px}
#hud .hp span{font-size:12px}
#exp-bar-wrap{display:none;position:absolute;bottom:0;left:0;right:0;height:8px;background:#333}
#exp-bar{height:100%;width:0%;background:linear-gradient(90deg,#7c4dff,#b388ff);transition:width 0.2s}
#minimap{display:none;position:absolute;top:40px;right:8px;width:60px;height:60px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.3);border-radius:4px}
#joystick{position:absolute;bottom:40px;left:20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);display:none;touch-action:none}
#joystick-knob{position:absolute;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.5);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#title-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a2e;z-index:20}
#title-screen h1{font:bold 36px monospace;color:#ffd54f;text-shadow:2px 2px #b8860b;margin-bottom:8px;letter-spacing:4px}
#title-screen .sub{color:#aaa;font:14px monospace;margin-bottom:40px}
#title-screen button{font:bold 18px monospace;color:#1a1a2e;background:#ffd54f;border:none;padding:12px 40px;border-radius:8px;cursor:pointer}
#title-screen button:hover{background:#ffe082}
#weapon-select{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);z-index:20}
#weapon-select h2{font:bold 22px monospace;color:#ffd54f;margin-bottom:20px}
.ws-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.ws-card{width:120px;padding:16px 10px;background:rgba(79,195,247,0.15);border:2px solid #4fc3f7;border-radius:8px;text-align:center;cursor:pointer;color:#fff;font-family:monospace}
.ws-card:hover{background:rgba(79,195,247,0.3)}
.ws-card .icon{font-size:32px;margin-bottom:6px}
.ws-card .name{font-size:13px;font-weight:bold;color:#4fc3f7}
.ws-card .desc{font-size:11px;color:#aaa;margin-top:4px}
#upgrade-panel{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);z-index:20}
#upgrade-panel h2{font:bold 24px monospace;color:#ffd54f;margin-bottom:16px}
.upg-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.upg-card{width:130px;padding:14px 10px;border-radius:8px;text-align:center;cursor:pointer;color:#fff;font-family:monospace;transition:transform 0.1s}
.upg-card:hover{transform:scale(1.05)}
.upg-card .icon{font-size:28px;margin-bottom:4px}
.upg-card .name{font-size:13px;font-weight:bold;margin-bottom:2px}
.upg-card .desc{font-size:11px;color:#aaa}
.upg-card .badge{display:inline-block;margin-top:6px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:bold}
#result-screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);z-index:20}
#result-screen .result-title{font:bold 32px monospace;margin-bottom:20px}
#result-screen .stats{text-align:center;font:14px monospace;color:#ccc;margin-bottom:30px;line-height:2}
#result-screen button{font:bold 16px monospace;color:#1a1a2e;background:#ffd54f;border:none;padding:10px 36px;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <span class="timer" id="hud-timer">5:00</span>
    <span class="level" id="hud-level">Lv.1</span>
    <span class="gold" id="hud-gold">0</span>
    <div class="hp" id="hud-hp"></div>
  </div>
  <div id="exp-bar-wrap"><div id="exp-bar"></div></div>
  <canvas id="minimap" width="60" height="60"></canvas>
  <div id="joystick"><div id="joystick-knob"></div></div>

  <div id="title-screen">
    <h1>肉鸽幸存者</h1>
    <div class="sub">5分钟，活下来</div>
    <button onclick="startGame()">开始游戏</button>
  </div>

  <div id="weapon-select">
    <h2>选择初始武器</h2>
    <div class="ws-cards">
      <div class="ws-card" onclick="pickWeapon('holywater')"><div class="icon">💧</div><div class="name">圣水</div><div class="desc">环绕旋转攻击</div></div>
      <div class="ws-card" onclick="pickWeapon('knife')"><div class="icon">🗡</div><div class="name">飞刀</div><div class="desc">自动投掷飞刀</div></div>
      <div class="ws-card" onclick="pickWeapon('lightning')"><div class="icon">⚡</div><div class="name">闪电</div><div class="desc">随机电击敌人</div></div>
    </div>
  </div>

  <div id="upgrade-panel">
    <h2>⬆ LEVEL UP! ⬆</h2>
    <div class="upg-cards" id="upg-cards"></div>
  </div>

  <div id="boss-warning" style="position:absolute;top:0;left:0;right:0;display:none;padding:8px;text-align:center;font:bold 18px monospace;color:#f44336;background:linear-gradient(90deg,rgba(244,67,54,0.4),rgba(244,67,54,0.1),rgba(244,67,54,0.4));z-index:15;letter-spacing:2px;text-shadow:0 0 8px #f44336">⚠ BOSS来了 ⚠</div>

  <div id="result-screen">
    <div class="result-title" id="result-title"></div>
    <div class="stats" id="result-stats"></div>
    <button onclick="restartGame()">再来一局</button>
  </div>
</div>
<script>
"use strict";

// ===== CONFIG =====
const CFG = {
  MAP_W: 2400, MAP_H: 2400,
  GAME_TIME: 300, // 5 minutes
  PLAYER_SPEED: 160, PLAYER_HP: 8, PLAYER_SIZE: 16,
  PICKUP_RANGE: 35, GEM_FLY_SPEED: 250,
  INVINCIBLE_TIME: 1.0,
  MAX_ENEMIES: 50, MAX_BULLETS: 100,
  EXP_TABLE: [0,10,15,22,30,40,52,66,82,100,120,144,172,206,246],
  ENEMY_TYPES: {
    zombie:   { w:16, h:16, hp:3, speed:40, dmg:1, color:'#4caf50' },
    bat:      { w:14, h:14, hp:1, speed:80, dmg:1, color:'#ab47bc' },
    skeleton: { w:14, h:14, hp:5, speed:20, dmg:1, color:'#e0e0e0', ranged:true, shootCD:2 },
    boss:     { w:32, h:32, hp:200, speed:30, dmg:2, color:'#f44336', isBoss:true },
    ghost:    { w:12, h:12, hp:2, speed:55, dmg:1, color:'#b0bec5', phaseShift:true, teleport:true }
  },
  WEAPONS: {
    holywater: { name:'圣水', icon:'💧', desc:'环绕旋转' },
    knife:     { name:'飞刀', icon:'🗡', desc:'自动投掷' },
    lightning: { name:'闪电', icon:'⚡', desc:'随机电击' },
    bible:     { name:'圣经', icon:'📖', desc:'范围旋转' },
    firestaff: { name:'火焰法杖', icon:'🔥', desc:'锥形火焰' },
    thunderholywater: { name:'雷暴圣水', icon:'⚡💧', desc:'旋转+链式闪电', evolved:true },
    fireknife: { name:'火焰飞刀', icon:'🔥🗡', desc:'燃烧穿透飞刀', evolved:true },
    holydomain: { name:'圣光领域', icon:'📖💧', desc:'超大范围+圣光脉冲', evolved:true }
  },
  EVOLUTIONS: [
    { a:'holywater', b:'lightning', result:'thunderholywater', name:'雷暴圣水', icon:'⚡💧', desc:'旋转+链式闪电' },
    { a:'knife', b:'firestaff', result:'fireknife', name:'火焰飞刀', icon:'🔥🗡', desc:'燃烧穿透飞刀' },
    { a:'bible', b:'holywater', result:'holydomain', name:'圣光领域', icon:'📖💧', desc:'超大范围+圣光脉冲' }
  ],
  PASSIVES: {
    speedboots: { name:'疾风靴', icon:'👢', desc:'移动速度+15%', maxStack:3 },
    armor:      { name:'护甲',   icon:'🛡', desc:'受伤减少+1', maxStack:3 },
    magnet:     { name:'磁铁',   icon:'🧲', desc:'经验获取+30%', maxStack:3 }
  },
  FOOD: {
    dropRate: 0.1, healAmount: 1, maxFood: 8, lifetime: 15, bossDropCount: 3,
    types: {
      zombie:   { icon:'🍖', color:'#8d6e63' },
      bat:      { icon:'🍇', color:'#ab47bc' },
      skeleton: { icon:'🧀', color:'#ffd54f' },
      boss:     { icon:'🍖', color:'#8d6e63' },
      ghost:    { icon:'🍞', color:'#e0e0e0' }
    }
  }
};

// ===== UTILS =====
function rand(a,b){return a+Math.random()*(b-a)}
function randInt(a,b){return Math.floor(rand(a,b+1))}
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

// ===== Vec2 =====
class V{
  constructor(x=0,y=0){this.x=x;this.y=y}
  add(v){return new V(this.x+v.x,this.y+v.y)}
  sub(v){return new V(this.x-v.x,this.y-v.y)}
  scale(s){return new V(this.x*s,this.y*s)}
  len(){return Math.hypot(this.x,this.y)}
  norm(){const l=this.len();return l>0?this.scale(1/l):new V()}
  dist(v){return this.sub(v).len()}
  clone(){return new V(this.x,this.y)}
}

// ===== Camera =====
class Camera{
  constructor(){this.x=0;this.y=0;this.tx=0;this.ty=0}
  follow(p){this.tx=p.x;this.ty=p.y}
  update(dt){
    this.x+=(this.tx-this.x)*0.1;
    this.y+=(this.ty-this.y)*0.1;
  }
  w2s(wx,wy,canvas){
    const dpr=window.devicePixelRatio||1;
    return{x:wx-this.x+canvas.width/(2*dpr), y:wy-this.y+canvas.height/(2*dpr)};
  }
  s2w(sx,sy,canvas){
    const dpr=window.devicePixelRatio||1;
    return{x:sx+this.x-canvas.width/(2*dpr), y:sy+this.y-canvas.height/(2*dpr)};
  }
}

// ===== Player =====
class Player{
  constructor(){
    this.x=CFG.MAP_W/2;this.y=CFG.MAP_H/2;
    this.w=CFG.PLAYER_SIZE;this.h=CFG.PLAYER_SIZE;
    this.speed=CFG.PLAYER_SPEED;this.hp=CFG.PLAYER_HP;this.maxHp=CFG.PLAYER_HP;
    this.level=1;this.exp=0;this.pickupRange=CFG.PICKUP_RANGE;
    this.armor=0;this.invTimer=0;this.kills=0;this.gold=0;
    this.weapons=[];this.passives={};
    this.facingAngle=0; // direction player faces (radians)
  }
  update(dt,input){
    if(input.x||input.y){
      this.x+=input.x*this.speed*dt;
      this.y+=input.y*this.speed*dt;
      this.facingAngle=Math.atan2(input.y,input.x);
    }
    this.x=clamp(this.x,this.w/2,CFG.MAP_W-this.w/2);
    this.y=clamp(this.y,this.h/2,CFG.MAP_H-this.h/2);
    if(this.invTimer>0)this.invTimer-=dt;
  }
  takeDamage(d){
    if(this.invTimer>0)return false;
    const realDmg=Math.max(1,d-this.armor);
    this.hp-=realDmg;
    this.invTimer=CFG.INVINCIBLE_TIME;
    return true;
  }
  addExp(amount){
    const bonus=1+(this.expBonus||0);
    this.exp+=Math.ceil(amount*bonus);
    while(this.level<CFG.EXP_TABLE.length && this.exp>=CFG.EXP_TABLE[this.level]){
      this.exp-=CFG.EXP_TABLE[this.level];
      this.level++;
      return true; // level up
    }
    return false;
  }
  draw(ctx,cam,canvas){
    if(this.invTimer>0 && Math.floor(this.invTimer*10)%2===0)return;
    const s=cam.w2s(this.x,this.y,canvas);
    const x=s.x-this.w/2, y=s.y-this.h/2;
    // Hat
    ctx.fillStyle='#1a237e';
    ctx.fillRect(x+2,y-6,12,6);
    ctx.fillRect(x+4,y-10,8,4);
    ctx.fillRect(x+5,y-12,6,2);
    // Body/robe
    ctx.fillStyle='#1565c0';
    ctx.fillRect(x+2,y,12,10);
    ctx.fillRect(x+1,y+10,14,4);
    // Face
    ctx.fillStyle='#ffe0b2';
    ctx.fillRect(x+5,y+1,6,4);
    // Eyes
    ctx.fillStyle='#000';
    ctx.fillRect(x+6,y+2,2,2);
    ctx.fillRect(x+9,y+2,2,2);
    // Staff
    ctx.fillStyle='#795548';
    ctx.fillRect(x+14,y-2,2,16);
    ctx.fillStyle='#ffd54f';
    ctx.fillRect(x+13,y-4,4,3);
  }
}

// ===== Enemy =====
class Enemy{
  constructor(type,x,y,hpMul,spdMul){
    const t=CFG.ENEMY_TYPES[type];
    this.type=type;this.x=x;this.y=y;
    this.w=t.w;this.h=t.h;
    this.hp=Math.ceil(t.hp*hpMul);this.maxHp=this.hp;
    this.speed=t.speed*spdMul;this.dmg=t.dmg;
    this.color=t.color;this.isBoss=t.isBoss||false;
    this.ranged=t.ranged||false;
    this.shootTimer=t.shootCD||0;
    this.hitCD=0; // contact damage cooldown
    this.phase=1; // boss phase
    this.chargeTimer=0;this.charging=false;this.chargeDir=null;
    this.sprayTimer=0;this.spiralAngle=0;
    // Ghost fields
    this.phaseShift=t.phaseShift||false;
    this.teleport=t.teleport||false;
    this.phShiftTimer=0;this.phShiftActive=false;
    this.hasTeleported=false;this.teleportCD=0;
  }
  update(dt,player,bullets){
    if(this.hitCD>0)this.hitCD-=dt;
    if(this.ranged){
      const d=dist(this,player);
      if(d>250){
        this.moveToward(player,dt);
      }else if(d<150){
        this.moveAway(player,dt);
      }
      this.shootTimer-=dt;
      if(this.shootTimer<=0){
        this.shootTimer=CFG.ENEMY_TYPES.skeleton.shootCD;
        const dir=new V(player.x-this.x,player.y-this.y).norm();
        bullets.push({x:this.x,y:this.y,vx:dir.x*120,vy:dir.y*120,w:6,h:6,dmg:1,life:3,color:'#ef5350'});
      }
    }else if(this.isBoss){
      this.updateBoss(dt,player,bullets);
    }else if(this.type==='ghost'){
      this.updateGhost(dt,player);
    }else{
      this.moveToward(player,dt);
    }
  }
  updateBoss(dt,player,bullets){
    // Phase 2 trigger
    if(this.hp<=this.maxHp/2&&this.phase===1){
      this.phase=2;this.sprayTimer=0;
    }
    // Phase 3 trigger (HP<25%)
    if(this.hp<=this.maxHp*0.25&&this.phase<3){
      this.phase=3;this.spiralAngle=0;
    }
    if(this.phase===1){
      this.moveToward(player,dt);
    }else if(this.phase===2){
      this.chargeTimer-=dt;
      if(this.chargeTimer<=0&&!this.charging){
        this.charging=true;this.chargeTimer=1.5;
        this.chargeDir=new V(player.x-this.x,player.y-this.y).norm();
      }
      if(this.charging){
        this.x+=this.chargeDir.x*this.speed*3*dt;
        this.y+=this.chargeDir.y*this.speed*3*dt;
        this.chargeTimer-=dt;
        if(this.chargeTimer<=0){
          this.charging=false;this.chargeTimer=2;
        }
      }else{
        this.moveToward(player,dt*0.5);
      }
      this.sprayTimer-=dt;
      if(this.sprayTimer<=0){
        this.sprayTimer=3;
        for(let i=0;i<8;i++){
          const a=Math.PI*2/8*i;
          bullets.push({x:this.x,y:this.y,vx:Math.cos(a)*100,vy:Math.sin(a)*100,w:8,h:8,dmg:1,life:2,color:'#ff5252'});
        }
      }
    }else if(this.phase===3){
      // Phase 3: fast chase + spiral barrage
      this.moveToward(player,dt*1.5);
      this.sprayTimer-=dt;
      if(this.sprayTimer<=0){
        this.sprayTimer=2;
        // Spiral: 16 bullets in expanding spiral
        for(let i=0;i<16;i++){
          const a=this.spiralAngle+Math.PI*2/16*i;
          bullets.push({x:this.x,y:this.y,vx:Math.cos(a)*80,vy:Math.sin(a)*80,w:8,h:8,dmg:1,life:3,color:'#ff1744'});
        }
        this.spiralAngle+=dt*1.5; // rotate spiral each frame
      }
    }
  }
  moveToward(target,dt){
    const dx=target.x-this.x, dy=target.y-this.y;
    const l=Math.hypot(dx,dy);
    if(l>1){this.x+=dx/l*this.speed*dt; this.y+=dy/l*this.speed*dt;}
  }
  updateGhost(dt,player){
    // Phase shift cycling: 2s solid, 1s translucent
    this.phShiftTimer-=dt;
    if(this.phShiftTimer<=0){
      this.phShiftActive=!this.phShiftActive;
      this.phShiftTimer=this.phShiftActive?1:2;
    }
    // Teleport when HP=1 and haven't teleported yet
    if(this.teleport&&this.hp===1&&!this.hasTeleported){
      this.hasTeleported=true;
      const away=Math.atan2(this.y-player.y,this.x-player.x);
      const offset=(Math.random()-0.5)*Math.PI/3;
      const d=rand(80,120);
      this.x=player.x-Math.cos(away+offset)*d;
      this.y=player.y-Math.sin(away+offset)*d;
      // Clamp to map
      this.x=clamp(this.x,10,CFG.MAP_W-10);
      this.y=clamp(this.y,10,CFG.MAP_H-10);
      this.teleportCD=0.5; // no damage for 0.5s after teleport
    }
    if(this.teleportCD>0)this.teleportCD-=dt;
    this.moveToward(player,dt);
  }
  hurt(dmg){
    // Ghost: phase shift halves damage, teleport CD blocks damage
    if(this.type==='ghost'){
      if(this.teleportCD>0)return;
      if(this.phShiftActive)dmg=Math.max(0,Math.floor(dmg*0.5));
    }
    this.hp-=dmg;
  }
  moveAway(target,dt){
    const dx=this.x-target.x, dy=this.y-target.y;
    const l=Math.hypot(dx,dy);
    if(l>1){this.x+=dx/l*this.speed*dt; this.y+=dy/l*this.speed*dt;}
  }
  draw(ctx,cam,canvas){
    const s=cam.w2s(this.x,this.y,canvas);
    const x=s.x-this.w/2, y=s.y-this.h/2;
    if(this.type==='zombie'){
      ctx.fillStyle='#4caf50';ctx.fillRect(x,y,this.w,this.h);
      ctx.fillStyle='#2e7d32';ctx.fillRect(x+2,y+2,4,4);ctx.fillRect(x+10,y+2,4,4);
      ctx.fillStyle='#1b5e20';ctx.fillRect(x+4,y+8,8,4);
      ctx.fillStyle='#000';ctx.fillRect(x+4,y+4,2,2);ctx.fillRect(x+10,y+4,2,2);
    }else if(this.type==='bat'){
      // Body (enlarged 10→14)
      ctx.fillStyle='#ab47bc';ctx.fillRect(x,y,this.w,this.h);
      // Wings (larger, more visible)
      ctx.fillStyle='#7b1fa2';
      ctx.fillRect(x-4,y+2,5,5);ctx.fillRect(x+this.w-1,y+2,5,5);
      ctx.fillStyle='#9c27b0';
      ctx.fillRect(x-3,y+3,3,3);ctx.fillRect(x+this.w,y+3,3,3);
      // Eyes
      ctx.fillStyle='#ffeb3b';ctx.fillRect(x+2,y+3,3,3);ctx.fillRect(x+9,y+3,3,3);
      ctx.fillStyle='#000';ctx.fillRect(x+3,y+4,1,1);ctx.fillRect(x+10,y+4,1,1);
    }else if(this.type==='skeleton'){
      ctx.fillStyle='#e0e0e0';ctx.fillRect(x+3,y,this.w-6,this.h);
      ctx.fillStyle='#bdbdbd';ctx.fillRect(x+1,y+2,4,10);ctx.fillRect(x+9,y+2,4,10);
      ctx.fillStyle='#212121';ctx.fillRect(x+4,y+2,2,3);ctx.fillRect(x+8,y+2,2,3);
      ctx.fillStyle='#4e342e';ctx.fillRect(x+12,y+4,3,8);
    }else if(this.type==='ghost'){
      // Alpha based on phase shift state
      let alpha=1;
      if(this.phShiftActive){
        alpha=0.2+Math.sin(Date.now()*0.02)*0.15;
      }
      ctx.globalAlpha=alpha;
      // Ghost body - translucent wavy shape
      ctx.fillStyle='#b0bec5';ctx.fillRect(x,y,this.w,this.h);
      // Inner glow
      ctx.fillStyle='#eceff1';ctx.fillRect(x+2,y+2,this.w-4,this.h-4);
      // Eyes - hollow dark
      ctx.fillStyle='#263238';ctx.fillRect(x+2,y+3,3,3);ctx.fillRect(x+7,y+3,3,3);
      // Mouth - wavy
      ctx.fillStyle='#546e7a';ctx.fillRect(x+3,y+8,2,2);ctx.fillRect(x+7,y+8,2,2);
      // Wavy tail (bottom)
      ctx.fillStyle='#90a4ae';
      ctx.fillRect(x+1,y+this.h,3,3);ctx.fillRect(x+8,y+this.h,3,3);
      ctx.globalAlpha=1;
    }else if(this.type==='boss'){
      // Phase-based color scheme
      let bodyColor,innerColor,wingColor,eyeColor,hornColor;
      if(this.phase===3){
        // Phase 3: dark crimson pulsing
        const pulse=Math.sin(Date.now()*0.008)*0.3+0.7;
        bodyColor=`rgba(136,14,79,${pulse})`;innerColor='#880e4f';
        wingColor='#ad1457';eyeColor='#ff1744';hornColor='#d50000';
      }else if(this.phase===2){
        // Phase 2: dark orange rage
        bodyColor='#e65100';innerColor='#bf360c';
        wingColor='#d84315';eyeColor='#ff6d00';hornColor='#ff3d00';
      }else{
        // Phase 1: classic red
        bodyColor='#d32f2f';innerColor='#b71c1c';
        wingColor='#c62828';eyeColor='#ffeb3b';hornColor='#ff6f00';
      }
      // Body
      ctx.fillStyle=bodyColor;ctx.fillRect(x,y,this.w,this.h);
      ctx.fillStyle=innerColor;ctx.fillRect(x+2,y+2,28,28);
      // Horns
      ctx.fillStyle=hornColor;ctx.fillRect(x+2,y-6,4,8);ctx.fillRect(x+26,y-6,4,8);
      // Wings
      ctx.fillStyle=wingColor;ctx.fillRect(x-8,y+6,10,16);ctx.fillRect(x+30,y+6,10,16);
      // Eyes
      ctx.fillStyle=eyeColor;ctx.fillRect(x+8,y+8,5,5);ctx.fillRect(x+19,y+8,5,5);
      ctx.fillStyle='#000';ctx.fillRect(x+10,y+10,2,2);ctx.fillRect(x+21,y+10,2,2);
      // Mouth - phase 3: open mouth with fire
      ctx.fillStyle='#fff';ctx.fillRect(x+8,y+20,16,4);
      if(this.phase===3){
        ctx.fillStyle='#ff6d00';ctx.fillRect(x+9,y+24,3,3);ctx.fillRect(x+15,y+24,3,3);ctx.fillRect(x+21,y+24,3,3);
      }
      ctx.fillStyle='#000';ctx.fillRect(x+10,y+20,2,4);ctx.fillRect(x+14,y+20,2,4);ctx.fillRect(x+18,y+20,2,4);ctx.fillRect(x+22,y+20,2,4);
      // HP bar
      ctx.fillStyle='#333';ctx.fillRect(x,y-12,this.w,6);
      ctx.fillStyle='#f44336';ctx.fillRect(x,y-12,this.w*(this.hp/this.maxHp),6);
      // HP percentage text
      ctx.fillStyle='#fff';ctx.font='bold 8px monospace';ctx.textAlign='center';
      ctx.fillText(`HP:${Math.ceil(this.hp/this.maxHp*100)}%`,x+this.w/2,y-14);
    }
    if(!this.isBoss && this.hp<this.maxHp){
      const bw=this.w;
      ctx.fillStyle='#333';ctx.fillRect(x,y-5,bw,3);
      ctx.fillStyle=this.color;ctx.fillRect(x,y-5,bw*(this.hp/this.maxHp),3);
    }
  }
}

// ===== Food =====
class Food{
  constructor(x,y,enemyType){
    const ft=CFG.FOOD.types[enemyType]||CFG.FOOD.types.zombie;
    this.x=x;this.y=y;this.icon=ft.icon;this.color=ft.color;
    this.lifetime=CFG.FOOD.lifetime;this.age=0;
  }
  update(dt,player,game){
    this.age+=dt;
    if(this.age>=this.lifetime)return false; // expired
    // Drift toward player (same as gems)
    const d=dist(this,player);
    const dir=new V(player.x-this.x,player.y-this.y).norm();
    if(d<player.pickupRange){
      this.x+=dir.x*CFG.GEM_FLY_SPEED*dt;
      this.y+=dir.y*CFG.GEM_FLY_SPEED*dt;
      d=dist(this,player);
      if(d<12){
        // Heal
        const wasFull=player.hp>=player.maxHp;
        player.hp=Math.min(player.hp+CFG.FOOD.healAmount,player.maxHp);
        if(wasFull){
          game.dmgTexts.push({x:player.x,y:player.y-20,text:'💚',life:0.6});
        }else{
          game.dmgTexts.push({x:player.x,y:player.y-20,text:'❤️+1',life:0.8});
        }
        return 'picked';
      }
    }else{
      const spd=30+40*(1-Math.min(d/800,1));
      this.x+=dir.x*spd*dt;
      this.y+=dir.y*spd*dt;
    }
    return true;
  }
  draw(ctx,cam,canvas){
    const s=cam.w2s(this.x,this.y,canvas);
    // Fade out in last 3 seconds
    const alpha=this.lifetime-this.age<3?(this.lifetime-this.age)/3:1;
    ctx.globalAlpha=alpha;
    ctx.font='14px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(this.icon,s.x,s.y);
    ctx.globalAlpha=1;
  }
}

class Knife extends Weapon{

  get dmg(){return this.level>=2?2.6:2}
  get pierce(){return this.level>=3?1:0}
  update(dt,enemies,bullets){
    this.timer-=dt;
    if(this.timer<=0){
      this.timer=this.cd;
      let nearest=null, nd=Infinity;
      for(const e of enemies){
        const d=dist(this.owner,e);
        if(d<nd){nd=d;nearest=e;}
      }
      if(nearest){
        for(let i=0;i<this.count;i++){
          const dir=new V(nearest.x-this.owner.x,nearest.y-this.owner.y).norm();
          const spread=i>0?(i%2===1?0.15:-0.15):0;
          const cos=Math.cos(spread),sin=Math.sin(spread);
          const dx=dir.x*cos-dir.y*sin;
          const dy=dir.x*sin+dir.y*cos;
          if(bullets.length<CFG.MAX_BULLETS){
            bullets.push({x:this.owner.x,y:this.owner.y,vx:dx*250,vy:dy*250,w:4,h:4,dmg:this.dmg,life:1.5,color:'#ffd54f',pierce:this.pierce,hit:new Set()});
          }
        }
      }

}

class Lightning extends Weapon{
  constructor(owner){super('lightning',owner);this.cd=2;this.timer=0;this.effects=[]}
  get dmg(){return this.level>=2?6:5}
  get chains(){return this.level>=3?2:this.level>=2?1:0}
  get bolts(){return this.level>=3?2:1}
  update(dt,enemies){
    this.timer-=dt;
    for(let i=this.effects.length-1;i>=0;i--){
      this.effects[i].t-=dt;
      if(this.effects[i].t<=0)this.effects.splice(i,1);
    }
    if(this.timer<=0){
      this.timer=this.cd;
      const screenEnemies=enemies.filter(e=>{
        const d=dist(this.owner,e);
        return d<400;
      });
      for(let b=0;b<this.bolts&&screenEnemies.length>0;b++){
        const idx=randInt(0,screenEnemies.length-1);
        const target=screenEnemies[idx];
        target.hurt(this.dmg);
        this.effects.push({x0:this.owner.x,y0:this.owner.y,x1:target.x,y1:target.y,t:0.2});
        // Chain
        let prev=target;
        const hit=new Set([target]);
        for(let c=0;c<this.chains;c++){
          let next=null,nd=Infinity;
          for(const e of enemies){
            if(hit.has(e))continue;
            const d=dist(prev,e);
            if(d<150&&d<nd){nd=d;next=e;}
          }
          if(next){
            next.hurt(this.dmg*0.5);
            hit.add(next);
            this.effects.push({x0:prev.x,y0:prev.y,x1:next.x,y1:next.y,t:0.2});
            prev=next;
          }
        }
      }
    }
  }
  draw(ctx,cam,canvas){
    for(const e of this.effects){
      const s0=cam.w2s(e.x0,e.y0,canvas);
      const s1=cam.w2s(e.x1,e.y1,canvas);
      ctx.strokeStyle=`rgba(255,235,59,${e.t*5})`;
      ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(s0.x,s0.y);
      const steps=4;
      for(let i=1;i<=steps;i++){
        const t=i/steps;
        const mx=s0.x+(s1.x-s0.x)*t+(Math.random()-0.5)*16;
        const my=s0.y+(s1.y-s0.y)*t+(Math.random()-0.5)*16;
        ctx.lineTo(mx,my);
      }
      ctx.lineTo(s1.x,s1.y);
      ctx.stroke();
    }
  }
}

class Bible extends Weapon{
  constructor(owner){super('bible',owner);this.angle=0;this.hitTimers=new Map()}
  get radius(){return this.level>=3?120:this.level>=2?104:80}
  get dmg(){return this.level>=3?2:1}
  get speed(){return this.level>=2?3.6:3}
  update(dt,enemies){
    this.angle+=dt*this.speed;
    for(const e of enemies){
      const d=dist(this.owner,e);
      if(d<this.radius){
        if(!this.hitTimers.has(e))this.hitTimers.set(e,0);
        const ht=this.hitTimers.get(e);
        if(ht<=0){
          e.hurt(this.dmg);
          this.hitTimers.set(e,0.3);
        }else{
          this.hitTimers.set(e,ht-dt);
        }
      }
    }
    // Cleanup dead references
    for(const [e] of this.hitTimers){
      if(!enemies.includes(e))this.hitTimers.delete(e);
    }
  }
  draw(ctx,cam,canvas){
    const s=cam.w2s(this.owner.x,this.owner.y,canvas);
    // Golden aura ring — distinct from HolyWater's blue orbs
    ctx.strokeStyle=`rgba(255,193,7,${0.3+Math.sin(this.angle*2)*0.15})`;
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(s.x,s.y,this.radius,0,Math.PI*2);
    ctx.stroke();
    // Rotating golden cross pages
    for(let i=0;i<2;i++){
      const a=this.angle+Math.PI*i;
      const cx=s.x+Math.cos(a)*this.radius*0.6;
      const cy=s.y+Math.sin(a)*this.radius*0.6;
      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate(a+Math.PI/2);
      // Book page — golden with dark text lines
      ctx.fillStyle='#ffc107';
      ctx.fillRect(-14,-5,28,10);
      ctx.fillStyle='#ff8f00';
      ctx.fillRect(-14,-5,28,2);
      ctx.fillRect(-14,3,28,2);
      ctx.fillStyle='#5d4037';
      ctx.fillRect(-10,-1,20,1);
      ctx.fillRect(-10,1,16,1);

  }
}

class FireStaff extends Weapon{
  constructor(owner){super('firestaff',owner)}
  get coneWidth(){return this.level>=3?120:this.level>=2?100:80}
  get coneRange(){return this.level>=3?160:this.level>=2?130:100}
  get dps(){return this.level>=3?7:this.level>=2?5:3}
  get burnDps(){return this.level>=3?2:0}
  update(dt,enemies){
    const angle=this.owner.facingAngle;
    const range=this.coneRange;
    const halfArc=Math.PI/6; // 30 degrees each side = 60 degree cone
    for(const e of enemies){
      const dx=e.x-this.owner.x, dy=e.y-this.owner.y;
      const d=Math.hypot(dx,dy);
      if(d<range&&d>1){
        const ea=Math.atan2(dy,dx);
        let diff=ea-angle;
        while(diff>Math.PI)diff-=Math.PI*2;
        while(diff<-Math.PI)diff+=Math.PI*2;
        if(Math.abs(diff)<halfArc){
          e.hurt(this.dps*dt);
          // Burn effect tracking
          if(!e._burn)e._burn={dmg:0,t:0};
          if(this.burnDps>0){e._burn.dmg=this.burnDmg;e._burn.t=2;}
        }
      }
    }
    // Apply burn to enemies outside cone
    for(const e of enemies){
      if(e._burn&&e._burn.t>0){
        if(!this._isInCone(e)){
          e.hurt(e._burn.dmg*dt);
        }
        e._burn.t-=dt;
        if(e._burn.t<=0)e._burn=null;
      }
    }
  }
  _isInCone(e){
    const dx=e.x-this.owner.x,dy=e.y-this.owner.y;
    const d=Math.hypot(dx,dy);
    if(d>=this.coneRange||d<1)return false;
    let diff=Math.atan2(dy,dx)-this.owner.facingAngle;
    while(diff>Math.PI)diff-=Math.PI*2;
    while(diff<-Math.PI)diff+=Math.PI*2;
    return Math.abs(diff)<Math.PI/6;
  }
  draw(ctx,cam,canvas){
    const s=cam.w2s(this.owner.x,this.owner.y,canvas);
    const angle=this.owner.facingAngle;
    const range=this.coneRange;
    const halfArc=Math.PI/6;
    // Cone fill
    const grad=ctx.createRadialGradient(s.x,s.y,5,s.x,s.y,range);
    grad.addColorStop(0,'rgba(255,152,0,0.5)');
    grad.addColorStop(0.6,'rgba(255,87,34,0.3)');
    grad.addColorStop(1,'rgba(255,87,34,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(s.x,s.y);
    ctx.arc(s.x,s.y,range,angle-halfArc,angle+halfArc);
    ctx.closePath();
    ctx.fill();
    // Inner bright core
    const grad2=ctx.createRadialGradient(s.x,s.y,3,s.x,s.y,range*0.4);
    grad2.addColorStop(0,'rgba(255,235,59,0.6)');
    grad2.addColorStop(1,'rgba(255,152,0,0)');
    ctx.fillStyle=grad2;
    ctx.beginPath();
    ctx.moveTo(s.x,s.y);
    ctx.arc(s.x,s.y,range*0.4,angle-halfArc*0.7,angle+halfArc*0.7);
    ctx.closePath();
    ctx.fill();
    // Flickering flame tips along cone edge
    const tipCount=this.level+2;
    for(let i=0;i<tipCount;i++){
      const t=0.4+0.6*i/tipCount;
      const a=angle-halfArc+halfArc*2*i/tipCount;
      const flicker=rand(0.7,1.0);
      const r=range*t*flicker;
      const tx=s.x+Math.cos(a)*r;
      const ty=s.y+Math.sin(a)*r;
      ctx.fillStyle=`rgba(255,${Math.floor(rand(100,200))},0,${0.4*flicker})`;
      ctx.fillRect(tx-2,ty-2,4,4);
      ctx.fillStyle=`rgba(255,235,59,${0.3*flicker})`;
      ctx.fillRect(tx-1,ty-1,2,2);
    }
  }
}

class ThunderHolyWater extends Weapon{
  constructor(owner){super('thunderholywater',owner);this.angle=0;this.lightningTimer=0;this.effects=[]}
  get maxLevel(){return 1}
  get count(){return 3}
  get radius(){return 60}
  get dmg(){return 1.5}
  get lightningDmg(){return 6}
  get chains(){return 3}
  get lightningCD(){return 2}
  update(dt,enemies){
    this.angle+=dt*3;
    // Holy water continuous damage
    for(let i=0;i<this.count;i++){
      const a=this.angle+Math.PI*2/this.count*i;
      const bx=this.owner.x+Math.cos(a)*this.radius;
      const by=this.owner.y+Math.sin(a)*this.radius;
      for(const e of enemies){
        if(Math.abs(bx-e.x)<(12+e.w/2)&&Math.abs(by-e.y)<(12+e.h/2)){
          e.hurt(this.dmg*dt*15);
        }
      }
    }
    // Chain lightning every 2s
    this.lightningTimer-=dt;
    for(let i=this.effects.length-1;i>=0;i--){
      this.effects[i].t-=dt;
      if(this.effects[i].t<=0)this.effects.splice(i,1);
    }
    if(this.lightningTimer<=0){
      this.lightningTimer=this.lightningCD;
      const nearEnemies=enemies.filter(e=>dist(this.owner,e)<250);
      for(let i=0;i<this.count&&nearEnemies.length>0;i++){
        const a=this.angle+Math.PI*2/this.count*i;
        const bx=this.owner.x+Math.cos(a)*this.radius;
        const by=this.owner.y+Math.sin(a)*this.radius;
        // Find nearest enemy to this orb
        let nearest=null,nd=Infinity;
        for(const e of nearEnemies){
          const d=Math.hypot(bx-e.x,by-e.y);
          if(d<nd){nd=d;nearest=e;}
        }
        if(nearest){
          nearest.hurt(this.lightningDmg);
          this.effects.push({x0:bx,y0:by,x1:nearest.x,y1:nearest.y,t:0.2});
          // Chain
          const hit=new Set([nearest]);
          let prev=nearest;
          for(let c=0;c<this.chains;c++){
            let next=null;nd=Infinity;
            for(const e of enemies){
              if(hit.has(e))continue;
              const d=dist(prev,e);
              if(d<150&&d<nd){nd=d;next=e;}
            }
            if(next){
              next.hurt(this.lightningDmg*0.5);
              hit.add(next);
              this.effects.push({x0:prev.x,y0:prev.y,x1:next.x,y1:next.y,t:0.2});
              prev=next;
            }
          }
        }
      }
    }
  }
  draw(ctx,cam,canvas){
    const r=this.radius;
    // Rotating orbs (electric blue + lightning glow)
    for(let i=0;i<this.count;i++){
      const a=this.angle+Math.PI*2/this.count*i;
      const bx=this.owner.x+Math.cos(a)*r;
      const by=this.owner.y+Math.sin(a)*r;
      const s=cam.w2s(bx,by,canvas);
      // Outer glow
      ctx.fillStyle='rgba(255,235,59,0.3)';
      ctx.fillRect(s.x-8,s.y-8,16,16);
      // Water orb
      ctx.fillStyle='#29b6f6';ctx.fillRect(s.x-5,s.y-5,10,10);
      ctx.fillStyle='#0288d1';ctx.fillRect(s.x-3,s.y-3,6,6);
      // Electric sparkle
      ctx.fillStyle='#ffeb3b';ctx.fillRect(s.x-1,s.y-1,2,2);
    }
    // Lightning bolt effects
    for(const e of this.effects){
      const s0=cam.w2s(e.x0,e.y0,canvas);
      const s1=cam.w2s(e.x1,e.y1,canvas);
      ctx.strokeStyle=`rgba(255,235,59,${e.t*5})`;
      ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(s0.x,s0.y);
      for(let i=1;i<=4;i++){
        const t=i/4;
        ctx.lineTo(s0.x+(s1.x-s0.x)*t+(Math.random()-0.5)*14,
                   s0.y+(s1.y-s0.y)*t+(Math.random()-0.5)*14);
      }
      ctx.lineTo(s1.x,s1.y);
      ctx.stroke();
    }
    // Evolution aura — pulsing ring
    const cs=cam.w2s(this.owner.x,this.owner.y,canvas);
    const pulse=Math.sin(Date.now()*0.004)*0.15+0.35;
    ctx.strokeStyle=`rgba(255,145,0,${pulse})`;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cs.x,cs.y,r+10,0,Math.PI*2);ctx.stroke();
  }
}

          const dir=new V(nearest.x-this.owner.x,nearest.y-this.owner.y).norm();
          const spread=i>0?(i%2===1?0.12:-0.12)*(Math.ceil(i/2)):0;
          const cos=Math.cos(spread),sin=Math.sin(spread);
          const dx=dir.x*cos-dir.y*sin;
          const dy=dir.x*sin+dir.y*cos;
          if(bullets.length<CFG.MAX_BULLETS){
            bullets.push({x:this.owner.x,y:this.owner.y,vx:dx*280,vy:dy*280,
              w:6,h:4,dmg:this.dmg,life:1.8,color:'#ff6d00',pierce:this.pierce,hit:new Set(),
              burnDmg:this.burnDps,burnDur:this.burnDur});
          }
        }
      }
    }
  }
}

class HolyDomain extends Weapon{
  constructor(owner){super('holydomain',owner);this.angle=0;this.pulseTimer=0;this.pulseEffects=[]}
  get maxLevel(){return 1}
  get radius(){return 130}
  get orbCount(){return 4}
  get orbDps(){return 2.5}
  get pulseInterval(){return 4}
  get pulseDmg(){return 12}
  get pulseRadius(){return 200}
  update(dt,enemies){
    this.angle+=dt*4;
    // Rotating holy orbs — continuous contact damage
    for(let i=0;i<this.orbCount;i++){
      const a=this.angle+Math.PI*2/this.orbCount*i;
      const bx=this.owner.x+Math.cos(a)*this.radius;
      const by=this.owner.y+Math.sin(a)*this.radius;
      for(const e of enemies){
        if(Math.abs(bx-e.x)<(14+e.w/2)&&Math.abs(by-e.y)<(14+e.h/2)){
          e.hurt(this.orbDps*dt);
        }
      }
    }
    // Holy pulse every 4s — AOE damage
    this.pulseTimer-=dt;
    for(let i=this.pulseEffects.length-1;i>=0;i--){
      this.pulseEffects[i].t-=dt;
      if(this.pulseEffects[i].t<=0)this.pulseEffects.splice(i,1);
    }
    if(this.pulseTimer<=0){
      this.pulseTimer=this.pulseInterval;
      for(const e of enemies){
        const d=dist(this.owner,e);
        if(d<this.pulseRadius){
          e.hurt(this.pulseDmg);
        }
      }
      this.pulseEffects.push({x:this.owner.x,y:this.owner.y,t:0.5,r:this.pulseRadius});
    }
  }
  draw(ctx,cam,canvas){
    const s=cam.w2s(this.owner.x,this.owner.y,canvas);
    // Evolution aura — pulsing white-gold ring
    const pulse=Math.sin(Date.now()*0.004)*0.15+0.35;
    ctx.strokeStyle=`rgba(255,215,0,${pulse})`;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(s.x,s.y,this.radius+10,0,Math.PI*2);ctx.stroke();
    // Rotating holy orbs
    for(let i=0;i<this.orbCount;i++){
      const a=this.angle+Math.PI*2/this.orbCount*i;
      const bx=this.owner.x+Math.cos(a)*this.radius;
      const by=this.owner.y+Math.sin(a)*this.radius;
      const os=cam.w2s(bx,by,canvas);
      // Outer glow
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.fillRect(os.x-10,os.y-10,20,20);
      // Core orb
      ctx.fillStyle='#e0e0ff';
      ctx.fillRect(os.x-6,os.y-6,12,12);
      ctx.fillStyle='#bbdefb';
      ctx.fillRect(os.x-4,os.y-4,8,8);
      // Bright center
      ctx.fillStyle='#fff';
      ctx.fillRect(os.x-2,os.y-2,4,4);
    }
    // Holy pulse AOE visual
    for(const p of this.pulseEffects){
      const ps=cam.w2s(p.x,p.y,canvas);
      const alpha=p.t*2;
      ctx.strokeStyle=`rgba(255,255,255,${alpha})`;
      ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(ps.x,ps.y,p.r*(1-p.t*0.5),0,Math.PI*2);ctx.stroke();
      ctx.fillStyle=`rgba(255,255,200,${alpha*0.15})`;
      ctx.beginPath();ctx.arc(ps.x,ps.y,p.r*(1-p.t*0.5),0,Math.PI*2);ctx.fill();
    }
  }
}

  joystickEl.style.display='block';

let joyTouchId=null;
joystickEl.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  joyTouchId=t.identifier;
  handleJoyMove(t);
},{passive:false});
joystickEl.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===joyTouchId)handleJoyMove(t);
  }
},{passive:false});
joystickEl.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===joyTouchId){
      joyTouchId=null;
      joystickInput.x=0;joystickInput.y=0;
      knobEl.style.transform='translate(-50%,-50%)';
    }
  }
});
function handleJoyMove(touch){
  const rect=joystickEl.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  let dx=touch.clientX-cx, dy=touch.clientY-cy;
  const maxR=rect.width/2-18;
  const d=Math.hypot(dx,dy);
  if(d>maxR){dx=dx/d*maxR;dy=dy/d*maxR;}
  joystickInput.x=dx/maxR;
  joystickInput.y=dy/maxR;
  knobEl.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}

function getInput(){
  let x=0,y=0;
  if(keys['w']||keys['arrowup'])y=-1;
  if(keys['s']||keys['arrowdown'])y=1;
  if(keys['a']||keys['arrowleft'])x=-1;
  if(keys['d']||keys['arrowright'])x=1;
  if(joystickInput.x||joystickInput.y){
    x=joystickInput.x;y=joystickInput.y;
  }
  const l=Math.hypot(x,y);
  if(l>1){x/=l;y/=l;}
  return{x,y};
}

// Upgrade system
const WEAPON_CLASSES={holywater:HolyWater,knife:Knife,lightning:Lightning,bible:Bible,firestaff:FireStaff,thunderholywater:ThunderHolyWater,fireknife:FireKnife,holydomain:HolyDomain};

function generateUpgrades(player){
  const pool=[];
  // New weapons
  const owned=new Set(player.weapons.map(w=>w.name));
  for(const name of ['holywater','knife','lightning','bible','firestaff']){
    if(!owned.has(name)){
      const wc=CFG.WEAPONS[name];
      pool.push({type:'weapon',icon:wc.icon,name:wc.name,desc:wc.desc,
        badge:'新武器',badgeColor:'#4fc3f7',
        apply:()=>{player.weapons.push(new WEAPON_CLASSES[name](player))}});
    }
  }
  // Weapon upgrades
  for(const w of player.weapons){
    if(w.level<w.maxLevel){
      const wc=CFG.WEAPONS[w.name];
      pool.push({type:'upgrade',icon:wc.icon,name:`${wc.name} Lv.${w.level+1}`,
        desc:`伤害/效果提升`,
        badge:'升级',badgeColor:'#ffd54f',
        apply:()=>{w.level++}});
    }
  }
  // Passives
  for(const [key,pc] of Object.entries(CFG.PASSIVES)){
    const stacks=player.passives[key]||0;
    if(stacks<pc.maxStack){
      pool.push({type:'passive',icon:pc.icon,name:pc.name,desc:pc.desc,
        badge:'被动',badgeColor:'#66bb6a',
        apply:()=>{
          player.passives[key]=(player.passives[key]||0)+1;
          if(key==='speedboots')player.speed*=1.15;
          if(key==='armor')player.armor+=1;
          if(key==='magnet')player.expBonus=(player.expBonus||0)+0.3;
        }});
    }
  }
  // Evolutions
  for(const evo of CFG.EVOLUTIONS){
    const wA=player.weapons.find(w=>w.name===evo.a&&w.level>=w.maxLevel);
    const wB=player.weapons.find(w=>w.name===evo.b&&w.level>=w.maxLevel);
    if(wA&&wB){
      pool.push({type:'evolution',icon:evo.icon,name:evo.name,desc:evo.desc,
        badge:'进化',badgeColor:'#ff9100',
        apply:()=>{
          player.weapons=player.weapons.filter(w=>w!==wA&&w!==wB);
          player.weapons.push(new WEAPON_CLASSES[evo.result](player));
        }});
    }
  }
  // Shuffle and pick 3
  for(let i=pool.length-1;i>0;i--){
    const j=randInt(0,i);
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  return pool.slice(0,3);
}

function showUpgrade(choices){
  const panel=document.getElementById('upgrade-panel');

  cards.innerHTML='';
  for(const c of choices){

    card.className='upg-card';
    card.style.background=`rgba(${c.badgeColor==='#4fc3f7'?'79,195,247':c.badgeColor==='#ffd54f'?'255,213,79':c.badgeColor==='#ff9100'?'255,145,0':'102,187,106'},0.15)`;
    card.style.border=`2px solid ${c.badgeColor}`;
    card.innerHTML=`<div class="icon">${c.icon}</div><div class="name" style="color:${c.badgeColor}">${c.name}</div><div class="desc">${c.desc}</div><div class="badge" style="background:${c.badgeColor};color:#1a1a2e">${c.badge}</div>`;

// Spawner
function getSpawnRate(elapsed){
  if(elapsed<120)return{interval:2.5,count:1,types:['zombie']};
  if(elapsed<180)return{interval:2,count:2,types:['zombie','bat']};
  if(elapsed<240)return{interval:1.2,count:2,types:['zombie','bat','skeleton','ghost']};
  if(elapsed<270)return{interval:0.8,count:3,types:['zombie','bat','skeleton','ghost']};
  return{interval:0.5,count:3,types:['zombie','bat','skeleton','ghost']};
}

// Scene management
function showScene(id){
  ['title-screen','weapon-select','upgrade-panel','result-screen'].forEach(s=>{

function endGame(won){

  document.getElementById('result-title').style.color=won?'#ffd54f':'#ef5350';

    `击杀: ${game.player.kills}<br>存活: ${m}:${s.toString().padStart(2,'0')}<br>金币: ${game.player.gold}`;

// Main loop
let lastTime=0;
function loop(time){
  requestAnimationFrame(loop);
  if(!game||game.over){
    // Draw title bg or nothing
    if(!game){
      ctx.fillStyle='#1a1a2e';
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
    lastTime=time;return;
  }
  const dt=Math.min((time-lastTime)/1000,0.05);
  lastTime=time;

  if(!game.paused){
    game.elapsed+=dt;

    // Check time
    if(game.elapsed>=CFG.GAME_TIME&&!game.won){
      endGame(false);return;
    }
    // Boss spawn
    if(game.elapsed>=270&&!game.bossSpawned){
      game.bossSpawned=true;
      game.screenFlash=0.5;
      // Show boss warning for 3 seconds
      const bw=document.getElementById('boss-warning');
      bw.style.display='block';
      setTimeout(()=>{bw.style.display='none';},3000);
      const angle=Math.random()*Math.PI*2;
      game.enemies.push(new Enemy('boss',
        game.player.x+Math.cos(angle)*300,
        game.player.y+Math.sin(angle)*300,
        1,1));
    }

    // Input
    const input=getInput();
    game.player.update(dt,input);
    game.camera.follow(game.player);
    game.camera.update(dt);

    // Spawn
    const rate=getSpawnRate(game.elapsed);
    game.spawnTimer-=dt;
    if(game.spawnTimer<=0 && game.enemies.length<CFG.MAX_ENEMIES){
      game.spawnTimer=rate.interval;
      const minutes=game.elapsed/60;
      const hpMul=1+minutes*0.2;
      const spdMul=1+minutes*0.1;
      for(let i=0;i<rate.count&&game.enemies.length<CFG.MAX_ENEMIES;i++){
        const type=rate.types[randInt(0,rate.types.length-1)];
        const angle=Math.random()*Math.PI*2;
        const d=rand(250,400);
        game.enemies.push(new Enemy(type,
          game.player.x+Math.cos(angle)*d,
          game.player.y+Math.sin(angle)*d,
          hpMul,spdMul));
      }
    }

    // Update enemies
    for(const e of game.enemies){
      e.update(dt,game.player,game.bullets);
      // Contact damage
      if(e.hitCD<=0&&!(e.type==='ghost'&&e.teleportCD>0)){
        if(Math.abs(e.x-game.player.x)<(e.w+game.player.w)/2&&
           Math.abs(e.y-game.player.y)<(e.h+game.player.h)/2){
          if(game.player.takeDamage(e.dmg)){
            e.hitCD=1;game.screenFlash=0.3;
            game.screenFlash=0.2;
            if(game.player.hp<=0){endGame(false);return;}
          }
        }
      }
    }
    // Remove dead enemies
    for(let i=game.enemies.length-1;i>=0;i--){
      const e=game.enemies[i];
      if(e.hp<=0){
        game.player.kills++;
        game.player.gold+=10;
        game.dmgTexts.push({x:e.x,y:e.y-10,text:'💀',life:0.8});
        // Drop gems
        const val=e.isBoss?50:(e.type==='skeleton'?3:e.type==='ghost'?2:e.type==='bat'?1:2);
        const count=e.isBoss?8:1;
        for(let g=0;g<count;g++){
          game.gems.push(new Gem(e.x+rand(-10,10),e.y+rand(-10,10),val/count|0||1));
        }
        // Drop food
        if(game.foods.length<CFG.FOOD.maxFood){
          const foodCount=e.isBoss?CFG.FOOD.bossDropCount:(Math.random()<CFG.FOOD.dropRate?1:0);
          for(let f=0;f<foodCount;f++){
            game.foods.push(new Food(e.x+rand(-12,12),e.y+rand(-12,12),e.type));
          }
        }
        // Boss kill = win if time >= 4:30
        if(e.isBoss&&game.elapsed>=270){endGame(true);return;}
        game.enemies.splice(i,1);
      }
    }

    // Update weapons
    for(const w of game.player.weapons){
      if(w instanceof HolyWater)w.update(dt,game.enemies);
      else if(w instanceof Knife)w.update(dt,game.enemies,game.bullets);
      else if(w instanceof Lightning)w.update(dt,game.enemies);
      else if(w instanceof Bible)w.update(dt,game.enemies);
      else if(w instanceof FireStaff)w.update(dt,game.enemies);
      else if(w instanceof ThunderHolyWater)w.update(dt,game.enemies);
      else if(w instanceof FireKnife)w.update(dt,game.enemies,game.bullets);
      else if(w instanceof HolyDomain)w.update(dt,game.enemies);
    }

    // Update bullets
    for(let i=game.bullets.length-1;i>=0;i--){
      const b=game.bullets[i];
      b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
      if(b.life<=0||b.x<0||b.x>CFG.MAP_W||b.y<0||b.y>CFG.MAP_H){
        game.bullets.splice(i,1);continue;
      }
      // Player bullets hit enemies
      if(b.color==='#ffd54f'||b.burnDmg){ // knife or fireknife
        for(let j=game.enemies.length-1;j>=0;j--){
          const e=game.enemies[j];
          if(b.hit&&b.hit.has(e))continue;
          if(Math.abs(b.x-e.x)<(b.w+e.w)/2&&Math.abs(b.y-e.y)<(b.h+e.h)/2){
            e.hurt(b.dmg);
            // Apply burn
            if(b.burnDmg){
              if(!e._burn)e._burn={dmg:0,t:0};
              e._burn.dmg=b.burnDmg;
              e._burn.t=b.burnDur||2;
            }
            if(b.hit)b.hit.add(e);
            if(!b.pierce||b.hit.size>b.pierce){
              game.bullets.splice(i,1);
            }
            break;
          }
        }
      }else{ // enemy bullets
        if(Math.abs(b.x-game.player.x)<(b.w+game.player.w)/2&&
           Math.abs(b.y-game.player.y)<(b.h+game.player.h)/2){
          if(game.player.takeDamage(b.dmg)){
            game.bullets.splice(i,1);game.screenFlash=0.3;
            if(game.player.hp<=0){endGame(false);return;}
          }
        }
      }
    }

    // Gems - all gems slowly move toward player
    for(let i=game.gems.length-1;i>=0;i--){
      const g=game.gems[i];
      let d=dist(g,game.player);
      const dir=new V(game.player.x-g.x,game.player.y-g.y).norm();
      if(d<game.player.pickupRange){
        // Fast fly
        g.x+=dir.x*CFG.GEM_FLY_SPEED*dt;
        g.y+=dir.y*CFG.GEM_FLY_SPEED*dt;
        d=dist(g,game.player);
        if(d<12){
          if(game.player.addExp(g.value)){
            const choices=generateUpgrades(game.player);
            if(choices.length>0)showUpgrade(choices);
          }
          game.gems.splice(i,1);
        }
      }else{
        // All gems drift toward player, speed based on distance
        const spd=40+60*(1-Math.min(d/1000,1));
        g.x+=dir.x*spd*dt;
        g.y+=dir.y*spd*dt;
      }
    }

    // Foods
    for(let i=game.foods.length-1;i>=0;i--){
      const result=game.foods[i].update(dt,game.player,game);
      if(result===false||result==='picked'){
        game.foods.splice(i,1);
      }
    }
  }

  // ===== DRAW =====
  const W=window.innerWidth, H=window.innerHeight;
  ctx.fillStyle='#1a1a2e';
  ctx.fillRect(0,0,W,H);

  // Ground - single fill for visible area
  const cam=game.camera;
  const gridSize=32;
  const gs=cam.w2s(0,0,canvas);
  const ge=cam.w2s(CFG.MAP_W,CFG.MAP_H,canvas);
  const mapX=gs.x, mapY=gs.y, mapW=ge.x-gs.x, mapH=ge.y-gs.y;
  ctx.fillStyle='#2e7d32';
  ctx.fillRect(mapX,mapY,mapW,mapH);
  // Grid lines
  ctx.strokeStyle='rgba(0,0,0,0.08)';
  ctx.lineWidth=0.5;
  const startX=Math.floor((cam.x-W/2)/gridSize)*gridSize;
  const startY=Math.floor((cam.y-H/2)/gridSize)*gridSize;
  for(let gx=startX;gx<cam.x+W/2+gridSize;gx+=gridSize){
    if(gx>=0&&gx<=CFG.MAP_W){
      const s=cam.w2s(gx,0,canvas);
      ctx.beginPath();ctx.moveTo(s.x,0);ctx.lineTo(s.x,H);ctx.stroke();
    }
  }
  for(let gy=startY;gy<cam.y+H/2+gridSize;gy+=gridSize){
    if(gy>=0&&gy<=CFG.MAP_H){
      const s=cam.w2s(0,gy,canvas);
      ctx.beginPath();ctx.moveTo(0,s.y);ctx.lineTo(W,s.y);ctx.stroke();
    }
  }

  // Map boundary
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=2;
  ctx.strokeRect(mapX,mapY,mapW,mapH);

  ctx.imageSmoothingEnabled=false;

  // Gems
  for(const g of game.gems)g.draw(ctx,cam,canvas);
  // Foods
  for(const f of game.foods)f.draw(ctx,cam,canvas);
  // Enemies
  for(const e of game.enemies){
    e.draw(ctx,cam,canvas);
    // Burn effect overlay
    if(e._burn&&e._burn.t>0){
      const bs=cam.w2s(e.x,e.y,canvas);
      const flicker=Math.sin(Date.now()*0.015)*0.2+0.5;
      ctx.fillStyle=`rgba(255,87,34,${flicker})`;
      ctx.fillRect(bs.x-e.w/2,bs.y-e.h/2,e.w,e.h);
      // Small flame particles
      for(let p=0;p<2;p++){
        const fx=bs.x+rand(-e.w/2,e.w/2);
        const fy=bs.y-e.h/2-rand(2,8);
        ctx.fillStyle=`rgba(255,${152+Math.floor(rand(0,80))},0,${flicker})`;
        ctx.fillRect(fx,fy,2,3);
      }
    }
  }
  // Player
  game.player.draw(ctx,cam,canvas);
  // Weapon visuals
  for(const w of game.player.weapons){
    if(w.draw)w.draw(ctx,cam,canvas);
  }
  // Bullets
  for(const b of game.bullets){
    const s=cam.w2s(b.x,b.y,canvas);
    if(b.color==='#ffd54f'){
      ctx.fillStyle='#ffd54f';
      ctx.save();
      const angle=Math.atan2(b.vy,b.vx);
      ctx.translate(s.x,s.y);
      ctx.rotate(angle);
      ctx.fillRect(-6,-1,12,3);
      ctx.fillRect(4,-2,4,4);
      ctx.restore();
    }else if(b.color==='#ff6d00'){
      // Fire knife: orange blade + flame trail
      ctx.save();
      const angle=Math.atan2(b.vy,b.vx);
      ctx.translate(s.x,s.y);
      ctx.rotate(angle);
      // Flame trail
      ctx.fillStyle='rgba(255,87,34,0.5)';
      ctx.fillRect(-12,-2,8,4);
      ctx.fillStyle='rgba(255,152,0,0.4)';
      ctx.fillRect(-10,-1,6,2);
      // Blade body
      ctx.fillStyle='#ff6d00';
      ctx.fillRect(-6,-1.5,12,3);
      ctx.fillStyle='#ff9100';
      ctx.fillRect(4,-2.5,5,5);
      // Bright tip
      ctx.fillStyle='#ffeb3b';
      ctx.fillRect(7,-1,3,2);
      ctx.restore();
    }else{
      ctx.fillStyle=b.color;
      ctx.fillRect(s.x-b.w/2,s.y-b.h/2,b.w,b.h);
    }
  }

  // Damage texts
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=game.dmgTexts.length-1;i>=0;i--){
    const t=game.dmgTexts[i];
    t.y-=30*dt;t.life-=dt;
    if(t.life<=0){game.dmgTexts.splice(i,1);continue;}
    const s=cam.w2s(t.x,t.y,canvas);
    ctx.font='bold 12px monospace';
    ctx.fillStyle=`rgba(255,82,82,${Math.min(1,t.life*3)})`;
    ctx.fillText(t.text,s.x,s.y);
  }

  // Screen flash (damage)
  if(game.screenFlash>0){
    game.screenFlash-=dt;
    ctx.fillStyle=`rgba(255,0,0,${game.screenFlash*0.4})`;
    ctx.fillRect(0,0,W,H);
  }

  // ===== HUD =====
  const remaining=Math.max(0,CFG.GAME_TIME-game.elapsed);
  const rm=Math.floor(remaining/60),rs=Math.floor(remaining%60);
  document.getElementById('hud-timer').textContent=`${rm}:${rs.toString().padStart(2,'0')}`;
  document.getElementById('hud-level').textContent=`Lv.${game.player.level}`;
  document.getElementById('hud-gold').textContent=`🪙 ${game.player.gold}`;

  // HP
  let hpHtml='';
  for(let i=0;i<game.player.maxHp;i++){
    hpHtml+=i<game.player.hp?'<span style="color:#ef5350">❤️</span>':'<span style="color:#555">🖤</span>';
  }
  document.getElementById('hud-hp').innerHTML=hpHtml;

  // Exp bar
  const nextExp=game.player.level<CFG.EXP_TABLE.length?CFG.EXP_TABLE[game.player.level]:999;
  document.getElementById('exp-bar').style.width=`${(game.player.exp/nextExp*100).toFixed(1)}%`;

  // Minimap
  mmCtx.fillStyle='rgba(0,0,0,0.6)';
  mmCtx.fillRect(0,0,60,60);
  const mmScale=60/CFG.MAP_W;
  // Enemies
  mmCtx.fillStyle='#ef5350';
  for(const e of game.enemies){
    const mx=e.x*mmScale, my=e.y*mmScale;
    const sz=e.isBoss?3:1;
    mmCtx.fillRect(mx-sz/2,my-sz/2,sz,sz);
  }
  // Player
  mmCtx.fillStyle='#4fc3f7';
  const px=game.player.x*mmScale, py=game.player.y*mmScale;
  mmCtx.fillRect(px-2,py-2,4,4);
}

requestAnimationFrame(loop);
showScene('title-screen');
</script>
</body>
</html>
